<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jobrolu · enter your access code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1015; --card:#161b23; --ink:#f2f5f3; --ink2:#c3cbd2; --mut:#7e8a96;
    --line:#262e39; --line2:#2e3742; --acc:#4fe39b; --acc2:#33c97f; --accdim:#16271e;
    --accln:#244e38; --accglow:rgba(79,227,155,.16); --fd:'Fredoka',sans-serif; --fb:'Nunito',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--fb);-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(820px 520px at 84% -6%,rgba(79,227,155,.10) 0%,transparent 60%),radial-gradient(700px 600px at 8% 108%,rgba(79,227,155,.07) 0%,transparent 58%),var(--bg);min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 38px}
  .brand{font-family:var(--fd);font-size:24px;font-weight:600;display:flex;align-items:center;gap:10px}
  .brand .mk{width:13px;height:13px;border-radius:99px;background:var(--acc);box-shadow:0 0 14px var(--acc)}
  .nav-r a{font-size:15px;font-weight:600;color:var(--ink2)}
  .nav-r a:hover{color:var(--acc)}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 28px 80px}
  .box{width:100%;max-width:440px;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:40px 36px;text-align:center}
  .lock{width:54px;height:54px;border-radius:16px;background:var(--accdim);border:1px solid var(--accln);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  h1{font-family:var(--fd);font-size:28px;font-weight:600;margin:0 0 10px;letter-spacing:-.01em}
  p{font-size:15px;color:var(--ink2);line-height:1.5;margin:0 0 26px}
  input{width:100%;background:#0a0d12;border:1px solid var(--line2);border-radius:14px;padding:15px 16px;color:var(--ink);font-family:var(--fb);font-size:16px;font-weight:600;text-align:center;letter-spacing:.04em;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accln)}
  button{width:100%;margin-top:14px;font-family:var(--fd);font-size:16px;font-weight:600;border:none;border-radius:14px;padding:15px;cursor:pointer;background:var(--acc);color:#08120c;box-shadow:0 6px 22px var(--accglow);transition:background .15s,transform .12s}
  button:hover{background:var(--acc2);transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .msg{font-size:14px;font-weight:600;margin-top:16px;min-height:18px}
  .msg.err{color:#e3804f}
  .foot{font-size:13px;color:var(--mut);margin-top:22px}
  .foot a{color:var(--acc);font-weight:600}
</style>
</head>
<body>
<nav>
  <a class="brand" href="/"><span class="mk"></span>Jobrolu</a>
  <div class="nav-r"><a href="/">← Home</a></div>
</nav>
<main>
  <div class="box">
    <div class="lock">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4fe39b" stroke-width="2">
        <rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </div>
    <h1>Members only</h1>
    <p>Jobrolu is invite-based for now. Enter your access code to open the app.</p>
    <input id="code" type="password" placeholder="Access code" autocomplete="off" autofocus
           onkeydown="if(event.key==='Enter')unlock()"/>
    <button id="btn" onclick="unlock()">Unlock →</button>
    <div class="msg" id="msg"></div>
    <div class="foot">Don't have a code? <a href="/">Learn more about Jobrolu</a></div>
  </div>
</main>
<script>
const API = location.origin.startsWith("file") ? "http://localhost:8000" : "";

// Where was the user trying to go? The server serves this same unlock page at
// /app and /start when locked, so the current path tells us their destination.
// Default to /app. Also honor an explicit ?next= if present.
function destination(){
  const params = new URLSearchParams(location.search);
  const next = params.get("next");
  if(next === "/start" || next === "/app") return next;
  const p = location.pathname;
  if(p.startsWith("/start")) return "/start";
  return "/app";
}

async function unlock(){
  const code = document.getElementById("code").value.trim();
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");
  if(!code){msg.className="msg err";msg.textContent="Enter your code.";return;}
  btn.disabled = true; msg.className="msg"; msg.textContent="Checking...";
  try{
    const r = await fetch(API + "/api/unlock", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"same-origin",
      body: JSON.stringify({code})
    });
    let ok = false, errText = "Incorrect code.";
    try{ const d = await r.json(); ok = !!d.ok; if(d && d.error) errText = d.error; }
    catch(e){ ok = r.ok; }
    if(ok){
      msg.className = "msg"; msg.textContent = "Welcome in.";
      // Bulletproof redirect: assign sends them where they were headed.
      window.location.assign(destination());
      return;
    }
    msg.className = "msg err"; msg.textContent = errText; btn.disabled = false;
  }catch(e){
    msg.className = "msg err"; msg.textContent = "Can't reach the server. Try again."; btn.disabled = false;
  }
}
</script>
</body>
</html>
